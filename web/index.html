<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TalentScout AI | Futbol Yetenek Platformu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background-image: url('assets/images/bg_main.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(2px);
            z-index: 0;
        }
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header futbol görseli */
        .header {
            background: linear-gradient(135deg, rgba(11, 43, 38, 0.9) 0%, rgba(15, 44, 31, 0.9) 100%), url('assets/images/bg_header.png');
            background-size: cover;
            background-blend-mode: overlay;
            color: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 3px solid #fbbf24;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 #00000030;
        }
        .logo span {
            background: #fbbf24;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-left: 8px;
            color: #0f172a;
        }
        .user-info {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logout-btn {
            background: #b91c1c;
            border: none;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Kart stilleri */
        .form-card, .video-card, .results-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            border: 1px solid rgba(251,191,36,0.3);
            transition: 0.2s;
        }
        .video-upload-area {
            background: #f1f5f9;
            background-image: url('assets/images/bg_upload.png');
            background-size: cover;
            background-position: center;
            border: 2px dashed #fbbf24;
            cursor: pointer;
            text-align: center;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            transition: 0.2s;
        }
        .talent-card {
            background: white;
            background-image: linear-gradient(120deg, #ffffff 0%, #fef9e6 100%);
            border-left: 6px solid #fbbf24;
            padding: 1rem;
            border-radius: 1rem;
        }
        button {
            background: #0f3b2c;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        button:hover {
            background: #1e5a44;
            transform: translateY(-2px);
        }
        .filter-bar {
            background: #fef9e6;
            border-radius: 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .hero {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(120deg, rgba(11, 43, 38, 0.8), rgba(26, 58, 46, 0.8)), url('assets/images/bg_hero.png');
            background-blend-mode: overlay;
            background-size: cover;
            color: white;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .analiz-sonuc {
            background: #0f172a;
            color: #facc15;
            border-left: 5px solid #facc15;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1rem;
            white-space: pre-wrap;
        }
        .hidden { display: none; }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #fbbf24;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-text { color: #ef4444; margin-top: 0.5rem; }
        .success-text { color: #16a34a; margin-top: 0.5rem; }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
            color: #0f172a;
        }
        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            font-size: 1rem;
        }
        .talent-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .ai-report-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (max-width: 700px) {
            .main-content { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="header">
        <div class="logo">⚽ TalentScout <span>AI Scout</span></div>
        <div id="headerUserArea" class="user-info hidden">
            <span id="userNameHeader"></span>
            <button id="logoutBtnHeader" class="logout-btn">Çıkış</button>
        </div>
    </div>

    <div class="main-content">
        <!-- GİRİŞ EKRANI -->
        <div id="loginSection">
            <div class="form-card">
                <div class="hero" style="margin-bottom:1rem;">
                    <h2>🔐 Futbolun Geleceğine Giriş</h2>
                    <p>Yapay zeka ile keşfedilen yetenekler</p>
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="loginEmail" placeholder="ornek@mail.com">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" placeholder="••••••">
                </div>
                <button id="doLoginBtn">Giriş Yap</button>
                <p style="margin-top:1rem; text-align:center;">Hesabın yok mu? <strong id="showRegisterBtn" style="color:#fbbf24; cursor:pointer;">Kayıt Ol</strong></p>
                <div id="loginError" class="error-text"></div>
            </div>
        </div>

        <!-- KAYIT EKRANI -->
        <div id="registerSection" class="hidden">
            <div class="form-card">
                <h2>📝 Yeni Yetenek veya Scout Kaydı</h2>
                <div class="form-group">
                    <label>Ad Soyad</label>
                    <input type="text" id="regFullname" placeholder="Ad Soyad">
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="regEmail" placeholder="ornek@mail.com">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="regPassword" placeholder="Şifre">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="regRole">
                        <option value="talent">⚡ Yetenek (Futbolcu)</option>
                        <option value="scout">🔍 Yetenek Avcısı (Scout)</option>
                    </select>
                </div>
                <div id="dynamicFields"></div>
                <button id="submitRegisterBtn">Kaydol</button>
                <p><span id="backToLoginBtn" style="color:#fbbf24; cursor:pointer;">← Giriş sayfasına dön</span></p>
                <div id="registerInfo" class="error-text"></div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardSection" class="hidden">
            <div id="roleSpecificPanel"></div>
        </div>
    </div>
</div>

<script>
    // ======================== 🔑 OPENAI API KEY (KENDİ KEY'İNİZİ YAZIN) ========================
    const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY_HERE";  // <--- Buraya kendi API key'inizi yapıştırın!
    // ========================================================================================

    // ---------- VERİ MODELİ (localStorage) ----------
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let talents = JSON.parse(localStorage.getItem('talents')) || [];
    let scouts = JSON.parse(localStorage.getItem('scouts')) || [];

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
    function saveAllData() {
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('talents', JSON.stringify(talents));
        localStorage.setItem('scouts', JSON.stringify(scouts));
    }

    // DOM elemanları
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const dynamicFieldsDiv = document.getElementById('dynamicFields');
    const regRoleSelect = document.getElementById('regRole');
    let selectedVideoFileForRegister = null;  // talent kayıt videosu

    // Dinamik alanları oluştur (rol bazlı)
    function renderDynamicFields() {
        const role = regRoleSelect.value;
        let html = '<div class="role-fields" style="margin-top:1rem;">';
        if (role === 'talent') {
            html += `<div class="form-group">
                        <label>📹 Yetenek Videosu (EN AZ 1 VİDEO YÜKLEMELİSİN)</label>
                        <div class="video-upload-area" id="videoUploadAreaReg" style="background:rgba(0,0,0,0.6); color:white;">🎥 Video seçmek için tıkla veya sürükle</div>
                        <input type="file" id="talentVideoInput" accept="video/*" style="display:none">
                        <div id="videoFileNameReg" class="success-text"></div>
                     </div>`;
            html += `<div class="form-group"><label>⚽ Mevki</label><input type="text" id="talentPosition" placeholder="Forvet, Orta Saha, Defans"></div>`;
            html += `<div class="form-group"><label>🎂 Yaş</label><input type="number" id="talentAge" placeholder="18"></div>`;
            html += `<div class="form-group"><label>🏆 Takımı (varsa)</label><input type="text" id="talentTeam" placeholder="Kulüp adı"></div>`;
            html += `<div class="form-group"><label>📏 Boy (cm)</label><input type="number" id="talentHeight" placeholder="180"></div>`;
        } else {
            html += `<div class="form-group"><label>🏢 Çalıştığı Kulüp / Kurum</label><input type="text" id="scoutClub" placeholder="Örn: Beşiktaş Scout Ekibi"></div>`;
            html += `<div class="form-group"><label>👥 Takım Adı (Scout ekibi)</label><input type="text" id="scoutTeamName" placeholder="Takım / Proje adı"></div>`;
            html += `<div class="form-group"><label>📞 Telefon (isteğe bağlı)</label><input type="text" id="scoutPhone" placeholder="555 123 45 67"></div>`;
        }
        html += '</div>';
        dynamicFieldsDiv.innerHTML = html;

        if (role === 'talent') {
            const uploadArea = document.getElementById('videoUploadAreaReg');
            const fileInput = document.getElementById('talentVideoInput');
            if (uploadArea) {
                uploadArea.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length) {
                        selectedVideoFileForRegister = e.target.files[0];
                        document.getElementById('videoFileNameReg').innerText = `✅ ${selectedVideoFileForRegister.name}`;
                    }
                });
                uploadArea.addEventListener('dragover', e => e.preventDefault());
                uploadArea.addEventListener('drop', e => {
                    e.preventDefault();
                    if (e.dataTransfer.files.length) {
                        selectedVideoFileForRegister = e.dataTransfer.files[0];
                        document.getElementById('videoFileNameReg').innerText = `✅ ${selectedVideoFileForRegister.name}`;
                    }
                });
            }
        }
    }
    regRoleSelect.addEventListener('change', renderDynamicFields);
    renderDynamicFields();

    // Kayıt işlemi
    document.getElementById('submitRegisterBtn').addEventListener('click', () => {
        const fullname = document.getElementById('regFullname').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const role = regRoleSelect.value;

        if (!fullname || !email || !password) {
            document.getElementById('registerInfo').innerText = 'Lütfen tüm temel alanları doldurun.';
            return;
        }
        if (users.find(u => u.email === email)) {
            document.getElementById('registerInfo').innerText = 'Bu e-posta zaten kayıtlı.';
            return;
        }

        if (role === 'talent') {
            if (!selectedVideoFileForRegister) {
                document.getElementById('registerInfo').innerText = '❌ Yetenek kaydı için en az 1 video yüklemelisiniz!';
                return;
            }
            const position = document.getElementById('talentPosition')?.value || '';
            const age = parseInt(document.getElementById('talentAge')?.value) || 0;
            const team = document.getElementById('talentTeam')?.value || '';
            const height = parseInt(document.getElementById('talentHeight')?.value) || 0;
            if (!position || age < 14 || age > 50) {
                document.getElementById('registerInfo').innerText = 'Mevki ve geçerli yaş (14-50) giriniz.';
                return;
            }
            const talentId = generateId();
            users.push({ id: talentId, email, password, fullname, role: 'talent' });
            talents.push({
                userId: talentId, fullname, email, position, age, team, height,
                videoName: selectedVideoFileForRegister.name,
                registeredAt: new Date().toISOString()
            });
            saveAllData();
            alert('🎉 Yetenek kaydı başarılı! Şimdi giriş yapabilirsiniz.');
        } else {
            const scoutClub = document.getElementById('scoutClub')?.value.trim();
            const scoutTeamName = document.getElementById('scoutTeamName')?.value.trim();
            if (!scoutClub || !scoutTeamName) {
                document.getElementById('registerInfo').innerText = 'Kulüp ve Takım adı zorunludur.';
                return;
            }
            const scoutId = generateId();
            users.push({ id: scoutId, email, password, fullname, role: 'scout' });
            scouts.push({
                userId: scoutId, fullname, email, club: scoutClub, teamName: scoutTeamName,
                phone: document.getElementById('scoutPhone')?.value || ''
            });
            saveAllData();
            alert('✅ Yetenek avcısı kaydı tamamlandı!');
        }
        showLoginScreen();
        selectedVideoFileForRegister = null;
    });

    // Giriş
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const user = users.find(u => u.email === email && u.password === pwd);
        if (!user) {
            document.getElementById('loginError').innerText = 'Hatalı e-posta veya şifre.';
            return;
        }
        sessionStorage.setItem('activeUserId', user.id);
        sessionStorage.setItem('activeUserRole', user.role);
        sessionStorage.setItem('activeUserName', user.fullname);
        showDashboard();
    });

    // Çıkış
    function logout() {
        sessionStorage.clear();
        showLoginScreen();
    }

    // Ekran geçişleri
    function showLoginScreen() {
        loginSection.classList.remove('hidden');
        registerSection.classList.add('hidden');
        dashboardSection.classList.add('hidden');
        document.getElementById('headerUserArea').classList.add('hidden');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').innerText = '';
    }

    function showRegisterScreen() {
        loginSection.classList.add('hidden');
        registerSection.classList.remove('hidden');
        dashboardSection.classList.add('hidden');
        document.getElementById('headerUserArea').classList.add('hidden');
        renderDynamicFields();
        document.getElementById('registerInfo').innerText = '';
    }

    function showDashboard() {
        loginSection.classList.add('hidden');
        registerSection.classList.add('hidden');
        dashboardSection.classList.remove('hidden');
        const userName = sessionStorage.getItem('activeUserName');
        const role = sessionStorage.getItem('activeUserRole');
        document.getElementById('userNameHeader').innerHTML = `${userName} (${role === 'talent' ? 'Yetenek' : 'Scout'})`;
        document.getElementById('headerUserArea').classList.remove('hidden');
        renderDashboardByRole(role);
    }

    // ---------- YAPAY ZEKA ANALİZ (OpenAI Vision) SABIT API KEY ILE ----------
    async function getVideoThumbnailBase64(file) {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            video.preload = 'metadata';
            video.src = URL.createObjectURL(file);
            video.addEventListener('loadeddata', () => { video.currentTime = 0.2; });
            video.addEventListener('seeked', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
                URL.revokeObjectURL(video.src);
                resolve(base64);
            });
            video.onerror = reject;
        });
    }

    async function callOpenAIVision(imageBase64) {
        if (!OPENAI_API_KEY || OPENAI_API_KEY === "YOUR_OPENAI_API_KEY_HERE") {
            throw new Error('❌ Lütfen kodun içindeki OPENAI_API_KEY değişkenine kendi API key\'inizi yazın!');
        }
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_API_KEY}` },
            body: JSON.stringify({
                model: 'gpt-4-vision-preview',
                messages: [{
                    role: 'user',
                    content: [
                        { type: 'text', text: 'Bu futbol videosunun ilk karesini analiz et. Oyuncu pozisyonları, taktik görünüm, olası yetenekler hakkında Türkçe detaylı rapor ver. "AI Analysis Report" başlığı altında sun.' },
                        { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${imageBase64}` } }
                    ]
                }],
                max_tokens: 500
            })
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API hatası ${response.status}: ${errText}`);
        }
        const data = await response.json();
        return data.choices[0].message.content;
    }

    // ---------- PANEL (rol bazlı) - "AI Analysis Report" eklendi ----------
    function renderDashboardByRole(role) {
        const panelDiv = document.getElementById('roleSpecificPanel');
        const userId = sessionStorage.getItem('activeUserId');

        if (role === 'talent') {
            const talentData = talents.find(t => t.userId === userId);
            panelDiv.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:1.5rem;">
                    <div class="form-card" style="flex:2; background-image: url('assets/images/bg_talent_card.png'); background-size: cover; background-position: center; color:white; text-shadow:1px 1px 0 black;">
                        <h3>🎥 Takımını AI ile Analiz Et</h3>
                        <div class="video-upload-area" id="talentAnalizUploadArea" style="background:rgba(0,0,0,0.6); color:white;">📂 Takım videosu seç veya sürükle</div>
                        <input type="file" id="talentAnalizVideo" accept="video/*" style="display:none">
                        <button id="analyzeTalentTeamBtn" style="background:#fbbf24; color:#0f172a;">🧠 Yapay Zeka ile Analiz Et</button>
                        <div id="analizSonucDiv" class="analiz-sonuc hidden">
                            <div class="ai-report-header">📊 AI Analysis Report</div>
                            <div id="analizMetni"></div>
                        </div>
                        <div id="analizLoading" class="hidden spinner"></div>
                    </div>
                    <div class="form-card" style="flex:1;">
                        <h3>📋 Profil Bilgilerim</h3>
                        <p><strong>Ad:</strong> ${talentData?.fullname || '-'}</p>
                        <p><strong>Mevki:</strong> ${talentData?.position || '-'}</p>
                        <p><strong>Yaş:</strong> ${talentData?.age || '-'}</p>
                        <p><strong>Takım:</strong> ${talentData?.team || 'Belirtilmemiş'}</p>
                        <p><strong>Yüklenen Video:</strong> ${talentData?.videoName || 'Henüz yok'}</p>
                    </div>
                </div>
            `;
            const uploadArea = document.getElementById('talentAnalizUploadArea');
            const fileInput = document.getElementById('talentAnalizVideo');
            if (uploadArea) {
                uploadArea.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length) window.tempVideoForAnaliz = e.target.files[0];
                    uploadArea.innerText = `✅ ${e.target.files[0].name}`;
                });
                uploadArea.addEventListener('dragover', e => e.preventDefault());
                uploadArea.addEventListener('drop', e => {
                    e.preventDefault();
                    if (e.dataTransfer.files.length) {
                        window.tempVideoForAnaliz = e.dataTransfer.files[0];
                        uploadArea.innerText = `✅ ${window.tempVideoForAnaliz.name}`;
                    }
                });
            }
            document.getElementById('analyzeTalentTeamBtn')?.addEventListener('click', async () => {
                if (!window.tempVideoForAnaliz) return alert('Lütfen önce bir video seçin!');
                const resultDiv = document.getElementById('analizSonucDiv');
                const loadingDiv = document.getElementById('analizLoading');
                resultDiv.classList.add('hidden');
                loadingDiv.classList.remove('hidden');
                try {
                    const base64 = await getVideoThumbnailBase64(window.tempVideoForAnaliz);
                    const analysis = await callOpenAIVision(base64);
                    document.getElementById('analizMetni').innerHTML = analysis;
                    resultDiv.classList.remove('hidden');
                } catch (err) {
                    document.getElementById('analizMetni').innerHTML = `❌ Analiz hatası: ${err.message}`;
                    resultDiv.classList.remove('hidden');
                } finally {
                    loadingDiv.classList.add('hidden');
                }
            });
        } 
        else { // SCOUT PANELİ
            const scoutData = scouts.find(s => s.userId === userId);
            const allTalents = [...talents];
            panelDiv.innerHTML = `
                <div class="form-card" style="margin-bottom:1.5rem; background-image:url('assets/images/bg_scout_panel.png'); background-size:cover;">
                    <h3>🔍 Yetenek Filtreleme (Scout Paneli)</h3>
                    <div class="filter-bar">
                        <input type="text" id="filterName" placeholder="İsim ara">
                        <input type="text" id="filterPosition" placeholder="Mevki">
                        <input type="number" id="filterAgeMin" placeholder="Min Yaş">
                        <input type="number" id="filterAgeMax" placeholder="Max Yaş">
                        <button id="applyFilterBtn">Filtrele</button>
                    </div>
                </div>
                <div class="form-card" style="margin-bottom:1.5rem;">
                    <h3>🎬 Takım Analizi (Video Yükle)</h3>
                    <div class="video-upload-area" id="scoutAnalizUploadArea">📂 Takım videosu seç veya sürükle</div>
                    <input type="file" id="scoutAnalizVideo" accept="video/*" style="display:none">
                    <button id="analyzeScoutTeamBtn">🧠 AI ile Takım Analizi Yap</button>
                    <div id="scoutAnalizSonuc" class="analiz-sonuc hidden">
                        <div class="ai-report-header">📊 AI Analysis Report</div>
                        <div id="scoutAnalizMetni"></div>
                    </div>
                    <div id="scoutAnalizLoading" class="hidden spinner"></div>
                </div>
                <h3>⚽ Kayıtlı Yetenekler (${allTalents.length})</h3>
                <div id="talentListContainer" class="talent-list"></div>
            `;
            // Scout video analizi
            const scoutUpload = document.getElementById('scoutAnalizUploadArea');
            const scoutFile = document.getElementById('scoutAnalizVideo');
            if (scoutUpload) {
                scoutUpload.addEventListener('click', () => scoutFile.click());
                scoutFile.addEventListener('change', (e) => {
                    if (e.target.files.length) window.scoutVideoFile = e.target.files[0];
                    scoutUpload.innerText = `✅ ${e.target.files[0].name}`;
                });
                scoutUpload.addEventListener('dragover', e => e.preventDefault());
                scoutUpload.addEventListener('drop', e => {
                    e.preventDefault();
                    if (e.dataTransfer.files.length) {
                        window.scoutVideoFile = e.dataTransfer.files[0];
                        scoutUpload.innerText = `✅ ${window.scoutVideoFile.name}`;
                    }
                });
            }
            document.getElementById('analyzeScoutTeamBtn')?.addEventListener('click', async () => {
                if (!window.scoutVideoFile) return alert('Lütfen bir video seçin!');
                const resDiv = document.getElementById('scoutAnalizSonuc');
                const loadDiv = document.getElementById('scoutAnalizLoading');
                resDiv.classList.add('hidden');
                loadDiv.classList.remove('hidden');
                try {
                    const base64 = await getVideoThumbnailBase64(window.scoutVideoFile);
                    const analysis = await callOpenAIVision(base64);
                    document.getElementById('scoutAnalizMetni').innerHTML = analysis;
                    resDiv.classList.remove('hidden');
                } catch (err) {
                    document.getElementById('scoutAnalizMetni').innerHTML = `Hata: ${err.message}`;
                    resDiv.classList.remove('hidden');
                } finally {
                    loadDiv.classList.add('hidden');
                }
            });

            // Filtreleme fonksiyonu
            function renderFilteredTalents() {
                const nameFilter = (document.getElementById('filterName')?.value || '').toLowerCase();
                const posFilter = (document.getElementById('filterPosition')?.value || '').toLowerCase();
                const ageMin = parseInt(document.getElementById('filterAgeMin')?.value) || 0;
                const ageMax = parseInt(document.getElementById('filterAgeMax')?.value) || 99;
                let filtered = allTalents.filter(t =>
                    t.fullname.toLowerCase().includes(nameFilter) &&
                    (posFilter === '' || (t.position && t.position.toLowerCase().includes(posFilter))) &&
                    (ageMin === 0 || t.age >= ageMin) &&
                    (ageMax === 99 || t.age <= ageMax)
                );
                const container = document.getElementById('talentListContainer');
                if (!container) return;
                if (filtered.length === 0) {
                    container.innerHTML = '<p>Hiç yetenek bulunamadı.</p>';
                    return;
                }
                container.innerHTML = filtered.map(t => `
                    <div class="talent-card">
                        <strong>${t.fullname}</strong> (${t.age} yaş)<br>
                        📍 Mevki: ${t.position}<br>
                        🏟️ Takım: ${t.team || 'Kulüpsüz'}<br>
                        📏 Boy: ${t.height || '-'} cm<br>
                        🎥 Video: ${t.videoName || 'Yüklendi'}
                    </div>
                `).join('');
            }
            document.getElementById('applyFilterBtn')?.addEventListener('click', renderFilteredTalents);
            renderFilteredTalents();
        }
    }

    // Event listeners
    document.getElementById('showRegisterBtn')?.addEventListener('click', showRegisterScreen);
    document.getElementById('backToLoginBtn')?.addEventListener('click', showLoginScreen);
    document.getElementById('logoutBtnHeader')?.addEventListener('click', logout);

    // Sayfa yüklendiğinde oturum varsa dashboard'a git
    if (sessionStorage.getItem('activeUserId')) showDashboard();
    else showLoginScreen();
</script>
</body>
</html>
